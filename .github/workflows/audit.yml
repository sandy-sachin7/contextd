name: Security Audit

on:
  schedule:
    - cron: '0 12 * * *'
  push:
    paths:
      - '**/Cargo.lock'
      - '**/Cargo.toml'
      - '**/audit.toml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit --config .cargo/audit.toml
